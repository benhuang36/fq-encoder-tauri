<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FQEncoder</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="logo">✦</div>
        <div class="title-block">
          <h1>FQEncoder</h1>
          <p class="subtitle">把文字變成 F U C K Y O u</p>
        </div>
        <button id="settingsBtn" class="icon-btn" title="設定密碼" aria-label="設定密碼">⚙</button>
      </header>

      <section id="settings" class="settings hidden">
        <label for="password">編碼密碼</label>
        <div class="password-row">
          <input id="password" type="password" placeholder="留空使用預設密碼" autocomplete="off" />
          <button id="reveal" class="icon-btn" title="顯示／隱藏" aria-label="顯示或隱藏密碼">👁</button>
        </div>
        <p class="hint">相同文字在不同密碼下會編出完全不同的結果。編碼與解碼必須使用相同密碼。</p>
      </section>

      <div class="card">
        <div class="card-label">輸入</div>
        <textarea id="input" placeholder="輸入任何文字，或貼上編碼字串…"></textarea>
      </div>

      <div class="actions">
        <button id="encodeBtn" class="action">▼ Encode</button>
        <button id="decodeBtn" class="action">▲ Decode</button>
      </div>

      <div class="card">
        <div class="card-label">
          <span>輸出</span>
          <button id="copyBtn" class="copy hidden">複製</button>
        </div>
        <textarea id="output" readonly placeholder="結果會顯示在這裡"></textarea>
      </div>

      <footer id="footer" class="footer">Encode 任意文字 · Decode 只接受 F U C K Y O u</footer>
    </main>
  </body>
</html>
