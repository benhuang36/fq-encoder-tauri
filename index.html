<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FQEncoder</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="logo">✦</div>
        <div class="title-block">
          <h1>FQEncoder</h1>
          <p class="subtitle" data-i18n="subtitle"></p>
        </div>
        <button id="settingsBtn" class="icon-btn" data-i18n-title="settingsTitle">⚙</button>
      </header>

      <section id="settings" class="settings hidden">
        <div class="setting">
          <label data-i18n="langLabel"></label>
          <div class="segmented" id="langSeg">
            <button data-lang="en">English</button>
            <button data-lang="zh-Hant">中文</button>
          </div>
        </div>

        <div class="setting">
          <label for="password" data-i18n="passwordLabel"></label>
          <div class="password-row">
            <input id="password" type="password" data-i18n-placeholder="passwordPlaceholder" autocomplete="off" />
            <button id="reveal" class="icon-btn" data-i18n-title="revealTitle"></button>
          </div>
          <p class="hint" data-i18n="passwordHint"></p>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" id="advancedToggle" />
          <span data-i18n="advancedLabel"></span>
        </label>

        <div class="setting">
          <label data-i18n="hotkeyLabel"></label>
          <div class="password-row">
            <button id="hotkeyBtn" class="hotkey-input"></button>
            <button id="hotkeyReset" class="icon-btn" data-i18n-title="hotkeyResetTitle">↺</button>
          </div>
          <p class="hint" data-i18n="hotkeyHint"></p>
          <p id="hotkeyStatus" class="hint"></p>
        </div>
      </section>

      <nav class="tabs">
        <button class="tab active" data-tab="codec" data-i18n="tabCodec"></button>
        <button class="tab" id="tabAvalancheBtn" data-tab="avalanche" data-i18n="tabAvalanche"></button>
        <button class="tab" id="tabStegoBtn" data-tab="stego" data-i18n="tabStego"></button>
      </nav>

      <!-- ── Codec ── -->
      <section id="tab-codec" class="tab-panel">
        <div class="card">
          <div class="card-label" data-i18n="inputLabel"></div>
          <textarea id="input" data-i18n-placeholder="inputPlaceholder"></textarea>
        </div>
        <div class="actions">
          <button id="encodeBtn" class="action">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
            <span>Encode</span>
          </button>
          <button id="decodeBtn" class="action">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            <span>Decode</span>
          </button>
        </div>
        <div class="card">
          <div class="card-label">
            <span data-i18n="outputLabel"></span>
            <div class="label-actions">
              <button id="qrBtn" class="copy hidden" data-i18n="qrBtn"></button>
              <button id="copyBtn" class="copy hidden"></button>
            </div>
          </div>
          <textarea id="output" readonly data-i18n-placeholder="outputPlaceholder"></textarea>
        </div>
        <div id="qrBox" class="qrbox hidden"></div>
      </section>

      <!-- ── Avalanche ── -->
      <section id="tab-avalanche" class="tab-panel hidden">
        <div class="card">
          <div class="card-label" data-i18n="avInputLabel"></div>
          <textarea id="avInput" data-i18n-placeholder="avInputPlaceholder"></textarea>
        </div>
        <div class="actions">
          <button id="avFlipBtn" class="action">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
            <span data-i18n="avFlip"></span>
          </button>
        </div>
        <div class="card">
          <div class="card-label">
            <span data-i18n="avOutputLabel"></span>
            <span id="avStat" class="stat"></span>
          </div>
          <div id="avGrid" class="grid"></div>
        </div>
        <p class="hint" data-i18n="avHint"></p>
      </section>

      <!-- ── Stego ── -->
      <section id="tab-stego" class="tab-panel hidden">
        <div class="card compact">
          <div class="card-label" data-i18n="stSecretLabel"></div>
          <textarea id="stSecret" class="short" data-i18n-placeholder="stSecretPlaceholder"></textarea>
        </div>
        <div class="card compact">
          <div class="card-label" data-i18n="stCoverLabel"></div>
          <textarea id="stCover" class="short" data-i18n-placeholder="stCoverPlaceholder"></textarea>
        </div>
        <label class="checkbox-row">
          <input type="checkbox" id="stEncodeFirst" />
          <span data-i18n="stEncodeFirst"></span>
        </label>
        <div class="actions">
          <button id="stHideBtn" class="action">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            <span data-i18n="stHideBtn"></span>
          </button>
        </div>
        <div class="card compact">
          <div class="card-label">
            <span data-i18n="stHiddenLabel"></span>
            <button id="stHiddenCopy" class="copy hidden"></button>
          </div>
          <textarea id="stHidden" class="short" readonly></textarea>
        </div>

        <hr class="divider" />

        <div class="card compact">
          <div class="card-label" data-i18n="stRevealLabel"></div>
          <textarea id="stRevealIn" class="short" data-i18n-placeholder="stRevealPlaceholder"></textarea>
        </div>
        <div class="actions">
          <button id="stRevealBtn" class="action">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span data-i18n="stRevealBtn"></span>
          </button>
        </div>
        <div class="card compact">
          <div class="card-label" data-i18n="stRevealOutLabel"></div>
          <textarea id="stRevealOut" class="short" readonly></textarea>
        </div>
        <p id="stStatus" class="hint"></p>
      </section>

      <footer id="footer" class="footer"></footer>
    </main>
  </body>
</html>
